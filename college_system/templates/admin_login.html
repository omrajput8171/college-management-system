<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EduTech College</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo"><i class="fas fa-graduation-cap"></i> EduTech College</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
        </ul>
        <div class="hamburger"><span></span><span></span><span></span></div>
    </nav>

    <section class="login-section">
        <div class="login-container">
            <div class="login-form-card">
                <div class="card-icon"><i class="fas fa-user-shield"></i></div>
                <h2>Admin Login</h2>
                <p>Sign in to manage the institution</p>

                <form action="/admin/login" method="POST">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter admin email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter password" required>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
    </section>

</body>
</html>
